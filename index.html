<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sticks - Система печати этикеток">
  <meta name="theme-color" content="#e94560">
  <title>Sticks - Печать этикеток</title>
  <link rel="stylesheet" href="/css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg-primary: #0f0f1a; --bg-secondary: #1a1a2e; --bg-tertiary: #16213e; --accent: #e94560; --accent-hover: #ff6b6b; --text-primary: #eaeaea; --text-secondary: #a0a0a0; --border: #2a2a4a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); }
    #app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--border); position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; transform: translateX(-100%); transition: transform 0.3s ease; }
    .sidebar.open { transform: translateX(0); }
    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
    .sidebar-logo { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .sidebar-nav { padding: 16px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; color: var(--text-secondary); text-decoration: none; cursor: pointer; margin-bottom: 4px; }
    .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .nav-item.active { background: var(--accent); color: white; }
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; margin-left: 0; }
    .header { height: 60px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0; }
    .header-title { font-size: 1.25rem; font-weight: 600; }
    .content { flex: 1; padding: 16px; overflow-y: auto; background: var(--bg-primary); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 16px; border-radius: 8px; border: none; font-size: 0.9rem; font-weight: 500; cursor: pointer; text-decoration: none; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-icon { width: 40px; height: 40px; padding: 0; background: transparent; border: none; font-size: 1.2rem; cursor: pointer; }
    .card { background: var(--bg-secondary); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; margin-bottom: 4px; font-size: 0.85rem; color: var(--text-secondary); }
    .form-input { width: 100%; padding: 10px 16px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 0.95rem; }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .grid { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; }
    .toast { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-top: 8px; }
    .toast.success { border-left: 4px solid #4ecca3; }
    .toast.error { border-left: 4px solid #ff4757; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 40px; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-header h1 { font-size: 1.5rem; }
    .stat-card { text-align: center; padding: 24px; }
    .stat-icon { font-size: 2rem; margin-bottom: 8px; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-label { color: var(--text-secondary); font-size: 0.9rem; }
    .action-card { display: block; text-decoration: none; color: inherit; padding: 20px; border-radius: 12px; background: var(--bg-secondary); border: 1px solid var(--border); transition: transform 0.2s; }
    .action-card:hover { transform: translateY(-4px); }
    .action-icon { font-size: 2rem; margin-bottom: 8px; }
    .action-title { font-weight: 600; margin-bottom: 4px; }
    .action-desc { color: var(--text-secondary); font-size: 0.85rem; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th, .data-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    .data-table th { background: var(--bg-tertiary); font-weight: 600; font-size: 0.85rem; color: var(--text-secondary); }
    .data-table tr:hover { background: var(--bg-tertiary); }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; background: var(--bg-tertiary); }
    .badge-success { background: #4ecca3; color: #0f0f1a; }
    .ai-chat { display: flex; flex-direction: column; height: 400px; }
    .ai-messages { flex: 1; overflow-y: auto; padding: 16px; }
    .ai-message { margin-bottom: 16px; max-width: 80%; }
    .ai-message.user { margin-left: auto; }
    .ai-message .message-content { padding: 16px; border-radius: 12px; background: var(--bg-tertiary); }
    .ai-message.user .message-content { background: var(--accent); color: white; }
    .ai-input { display: flex; gap: 8px; padding: 16px; border-top: 1px solid var(--border); }
    .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }
    .version { font-size: 0.75rem; color: var(--text-secondary); }
    @media (max-width: 768px) { .sidebar { width: 100%; } .grid-2, .grid-3 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><div class="sidebar-logo">🎯 Sticks</div></div>
      <nav class="sidebar-nav">
        <div class="nav-item active" data-route="/"><span>🏠</span><span>Главная</span></div>
        <div class="nav-item" data-route="/templates"><span>📋</span><span>Шаблоны</span></div>
        <div class="nav-item" data-route="/products"><span>🏷️</span><span>Товары</span></div>
        <div class="nav-item" data-route="/print"><span>🖨️</span><span>Печать</span></div>
        <div class="nav-item" data-route="/ai"><span>🤖</span><span>ИИ Модуль</span></div>
        <div class="nav-item" data-route="/parser"><span>📥</span><span>Парсинг</span></div>
        <div class="nav-item" data-route="/map"><span>🗺️</span><span>Карта</span></div>
        <div class="nav-item" data-route="/settings"><span>⚙️</span><span>Настройки</span></div>
      </nav>
      <div class="sidebar-footer"><div class="version">v1.0.3</div></div>
    </aside>
    <main class="main-content">
      <header class="header">
        <button class="btn btn-icon" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <h1 class="header-title">Главная</h1>
        <button class="btn btn-icon" onclick="router.navigate('/settings')">⚙️</button>
      </header>
      <div class="content" id="content"><div class="loading"><div class="spinner"></div></div></div>
    </main>
  </div>
  <div class="toast-container"></div>

  <script>
    // Database
    const DB_NAME = 'sticks_db';
    class Database {
      constructor() { this.db = null; }
      async init() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, 1);
          request.onerror = () => reject(request.error);
          request.onsuccess = () => { this.db = request.result; resolve(this.db); };
          request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains('templates')) db.createObjectStore('templates', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('products')) db.createObjectStore('products', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('prints')) db.createObjectStore('prints', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'key' });
          };
        });
      }
      async add(store, data) {
        return new Promise((resolve, reject) => {
          const tx = this.db.transaction(store, 'readwrite');
          const request = tx.objectStore(store).add(data);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }
      async put(store, data) {
        return new Promise((resolve, reject) => {
          const tx = this.db.transaction(store, 'readwrite');
          const request = tx.objectStore(store).put(data);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }
      async get(store, key) {
        return new Promise((resolve) => {
          const tx = this.db.transaction(store, 'readonly');
          const request = tx.objectStore(store).get(key);
          request.onsuccess = () => resolve(request.result);
        });
      }
      async getAll(store) {
        return new Promise((resolve) => {
          const tx = this.db.transaction(store, 'readonly');
          const request = tx.objectStore(store).getAll();
          request.onsuccess = () => resolve(request.result || []);
        });
      }
      async delete(store, key) {
        return new Promise((resolve) => {
          const tx = this.db.transaction(store, 'readwrite');
          tx.objectStore(store).delete(key);
          tx.oncomplete = () => resolve(true);
        });
      }
      async clearStore(store) {
        return new Promise((resolve) => {
          const tx = this.db.transaction(store, 'readwrite');
          tx.objectStore(store).clear();
          tx.oncomplete = () => resolve(true);
        });
      }
      async clear() {
        await this.clearStore('templates');
        await this.clearStore('products');
        await this.clearStore('prints');
        await this.clearStore('settings');
      }
      async count(store) { return (await this.getAll(store)).length; }
      async getSetting(key, defaultValue) {
        const setting = await this.get('settings', key);
        return setting ? setting.value : defaultValue;
      }
      async setSetting(key, value) { await this.put('settings', { key, value }); }
    }

    // Router
    class Router {
      constructor() { this.currentRoute = '/'; }
      navigate(path) { 
        this.currentRoute = path; 
        window.location.hash = path; 
        this.handleRoute(); 
      }
      getPath() { return window.location.hash.slice(1) || '/'; }
      async handleRoute() {
        const path = this.getPath();
        this.currentRoute = path;
        console.log('Route:', path);
        
        // Update nav
        document.querySelectorAll('.nav-item').forEach(item => {
          item.classList.remove('active');
          if (item.dataset.route === path) item.classList.add('active');
        });
        
        // Close sidebar
        document.getElementById('sidebar').classList.remove('open');
        
        // Render page
        if (path === '/' || path === '') await app.renderHome();
        else if (path === '/templates') await app.renderTemplates();
        else if (path === '/products') await app.renderProducts();
        else if (path === '/print') await app.renderPrint();
        else if (path === '/ai') await app.renderAI();
        else if (path === '/parser') await app.renderParser();
        else if (path === '/map') await app.renderMap();
        else if (path === '/settings') await app.renderSettings();
        else await app.renderNotFound();
      }
      init() {
        window.addEventListener('hashchange', () => this.handleRoute());
        
        // Nav clicks
        document.querySelectorAll('.nav-item').forEach(item => {
          item.addEventListener('click', () => {
            const path = item.dataset.route;
            if (path) this.navigate(path);
          });
        });
        
        // Initial route
        if (!window.location.hash) window.location.hash = '#/';
        setTimeout(() => this.handleRoute(), 100);
      }
    }

    // AI Module
    class AIModule {
      constructor() { this.conversation = []; }
      async init() {}
      async setApiKey(provider, key) {
        if (db) await db.setSetting('ai_' + provider + '_key', key);
      }
      async getApiKey(provider) {
        if (db) return await db.getSetting('ai_' + provider + '_key', '');
        return '';
      }
      async hasApiKey(provider) { return (await this.getApiKey(provider)).length > 0; }
      async sendMessage(message) {
        const apiKey = await this.getApiKey('openai');
        if (!apiKey) return { error: 'API ключ не настроен' };
        this.conversation.push({ role: 'user', content: message });
        try {
          const response = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
            body: JSON.stringify({
              model: 'gpt-4o-mini',
              messages: [{ role: 'system', content: 'Ты - помощник для Sticks.' }, ...this.conversation.slice(-10), { role: 'user', content: message }],
              temperature: 0.7, max_tokens: 1000
            })
          });
          if (!response.ok) throw new Error('API error');
          const data = await response.json();
          const content = data.choices[0].message.content;
          this.conversation.push({ role: 'assistant', content });
          return { content };
        } catch (e) {
          this.conversation.pop();
          return { error: e.message };
        }
      }
    }

    // App
    let db, router, ai;
    const app = {
      updateHeader(title) { document.querySelector('.header-title').textContent = title; },
      render(html) { document.getElementById('content').innerHTML = html; },
      showToast(msg, type = '') {
        const toast = document.createElement('div');
        toast.className = 'toast ' + type;
        toast.textContent = msg;
        document.querySelector('.toast-container').appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      },
      async init() {
        console.log('Sticks init...');
        db = new Database();
        await db.init();
        ai = new AIModule();
        await ai.init();
        router = new Router();
        router.init();
        console.log('Sticks ready');
      },
      async renderHome() {
        this.updateHeader('Главная');
        const stats = { templates: await db.count('templates'), products: await db.count('products'), prints: await db.count('prints') };
        this.render('<h1>Добро пожаловать в Sticks</h1><p style="color:var(--text-secondary);margin-bottom:32px;">Система печати этикеток с ИИ</p><div class="grid grid-3"><div class="card stat-card"><div class="stat-icon">📋</div><div class="stat-value">' + stats.templates + '</div><div class="stat-label">Шаблонов</div></div><div class="card stat-card"><div class="stat-icon">🏷️</div><div class="stat-value">' + stats.products + '</div><div class="stat-label">Товаров</div></div><div class="card stat-card"><div class="stat-icon">🖨️</div><div class="stat-value">' + stats.prints + '</div><div class="stat-label">Печатей</div></div></div><h2 style="margin:32px 0 16px;">Быстрые действия</h2><div class="grid grid-2"><div class="action-card" onclick="router.navigate(\'/templates\')"><div class="action-icon">📋</div><div class="action-title">Шаблоны</div><div class="action-desc">Управление шаблонами</div></div><div class="action-card" onclick="router.navigate(\'/products\')"><div class="action-icon">🏷️</div><div class="action-title">Товары</div><div class="action-desc">Каталог товаров</div></div><div class="action-card" onclick="router.navigate(\'/print\')"><div class="action-icon">🖨️</div><div class="action-title">Печать</div><div class="action-desc">Печать этикеток</div></div><div class="action-card" onclick="router.navigate(\'/ai\')"><div class="action-icon">🤖</div><div class="action-title">ИИ Помощник</div><div class="action-desc">Спросить ИИ</div></div></div>');
      },
      async renderTemplates() {
        this.updateHeader('Шаблоны');
        const templates = await db.getAll('templates');
        this.render('<div class="page-header"><h1>Шаблоны</h1><button class="btn btn-primary" onclick="app.createTemplate()">+ Новый</button></div>' + (templates.length ? '<div class="grid grid-3">' + templates.map(t => '<div class="card"><h3>' + t.name + '</h3><p style="color:var(--text-secondary);font-size:0.85rem;">' + (t.width||50) + '×' + (t.height||30) + 'мм</p></div>').join('') + '</div>' : '<div class="empty-state"><p>Шаблонов пока нет</p><button class="btn btn-primary" onclick="app.createTemplate()" style="margin-top:16px;">Создать</button></div>'));
      },
      async createTemplate() {
        const tpl = { id: 'tpl_' + Date.now(), name: 'Шаблон ' + Date.now().toString().slice(-4), width: 50, height: 30, elements: [], createdAt: new Date().toISOString() };
        await db.add('templates', tpl);
        this.showToast('Шаблон создан', 'success');
        this.renderTemplates();
      },
      async renderProducts() {
        this.updateHeader('Товары');
        const products = await db.getAll('products');
        this.render('<div class="page-header"><h1>Товары</h1><button class="btn btn-primary" onclick="app.createProduct()">+ Добавить</button></div>' + (products.length ? '<table class="data-table"><thead><tr><th>Артикул</th><th>Название</th><th>Цена</th><th></th></tr></thead><tbody>' + products.map(p => '<tr><td>' + p.sku + '</td><td>' + p.name + '</td><td>' + (p.price||0) + ' ₽</td><td><button class="btn btn-secondary" style="padding:4px 8px;" onclick="app.deleteProduct(\'' + p.id + '\')">✕</button></td></tr>').join('') + '</tbody></table>' : '<div class="empty-state"><p>Товаров нет</p><button class="btn btn-primary" onclick="app.createProduct()" style="margin-top:16px;">Добавить</button></div>'));
      },
      async createProduct() {
        const prod = { id: 'prod_' + Date.now(), sku: 'SKU' + Date.now().toString().slice(-6), name: 'Товар', price: 0, createdAt: new Date().toISOString() };
        await db.add('products', prod);
        this.showToast('Товар добавлен', 'success');
        this.renderProducts();
      },
      async deleteProduct(id) {
        if (confirm('Удалить?')) { await db.delete('products', id); this.showToast('Удалён', 'success'); this.renderProducts(); }
      },
      async renderPrint() {
        this.updateHeader('Печать');
        const templates = await db.getAll('templates');
        const products = await db.getAll('products');
        this.render('<div class="page-header"><h1>Печать</h1></div><div class="grid grid-2"><div class="card"><h3>Шаблон</h3><select class="form-input" id="printTemplate"><option value="">-- Выберите --</option>' + templates.map(t => '<option value="' + t.id + '">' + t.name + '</option>').join('') + '</select></div><div class="card"><h3>Товар</h3><select class="form-input" id="printProduct"><option value="">-- Выберите --</option>' + products.map(p => '<option value="' + p.id + '">' + p.sku + ' - ' + p.name + '</option>').join('') + '</select></div></div><div class="form-group" style="margin-top:24px;"><label class="form-label">Количество</label><input type="number" class="form-input" id="printQty" value="1" min="1" style="width:100px;"></div><button class="btn btn-primary" onclick="app.doPrint()" style="margin-top:16px;">🖨️ Печатать</button>');
      },
      async doPrint() {
        const templateId = document.getElementById('printTemplate').value;
        const productId = document.getElementById('printProduct').value;
        const qty = parseInt(document.getElementById('printQty').value) || 1;
        if (!templateId || !productId) { this.showToast('Выберите шаблон и товар', 'error'); return; }
        await db.add('prints', { id: 'print_' + Date.now(), templateId, productId, qty, printedAt: new Date().toISOString() });
        this.showToast('Напечатано ' + qty + ' этикеток', 'success');
      },
      async renderAI() {
        this.updateHeader('ИИ');
        const hasKey = await ai.hasApiKey('openai');
        this.render('<div class="page-header"><h1>ИИ Модуль</h1></div><div class="card" style="margin-bottom:24px;"><h3>API ключ OpenAI</h3><div class="form-group"><input type="password" class="form-input" id="openaiKey" placeholder="sk-..." onchange="app.saveApiKey()"></div>' + (hasKey ? '<span class="badge badge-success">Настроен</span>' : '') + '</div><div class="card"><h3>Чат</h3><div class="ai-chat"><div class="ai-messages" id="aiMessages"><p style="color:var(--text-secondary);">Задайте вопрос</p></div><div class="ai-input"><input type="text" class="form-input" id="aiInput" placeholder="Сообщение..." onkeypress="if(event.key==\'Enter\')app.sendAI()"><button class="btn btn-primary" onclick="app.sendAI()">Отправить</button></div></div></div>');
      },
      async saveApiKey() {
        const key = document.getElementById('openaiKey').value;
        if (key) { await ai.setApiKey('openai', key); this.showToast('Сохранён', 'success'); this.renderAI(); }
      },
      async sendAI() {
        const input = document.getElementById('aiInput');
        const msg = input.value.trim();
        if (!msg) return;
        const msgs = document.getElementById('aiMessages');
        msgs.innerHTML += '<div class="ai-message user"><div class="message-content">' + msg + '</div></div>';
        input.value = '';
        msgs.innerHTML += '<div class="ai-message"><div class="message-content"><div class="spinner"></div></div></div>';
        msgs.scrollTop = msgs.scrollHeight;
        const resp = await ai.sendMessage(msg);
        msgs.querySelector('.spinner')?.closest('.ai-message')?.remove();
        if (resp.error) msgs.innerHTML += '<div class="ai-message"><div class="message-content" style="color:#ff4757;">' + resp.error + '</div></div>';
        else msgs.innerHTML += '<div class="ai-message"><div class="message-content">' + resp.content + '</div></div>';
        msgs.scrollTop = msgs.scrollHeight;
      },
      async renderParser() {
        this.updateHeader('Парсинг');
        this.render('<div class="page-header"><h1>Парсинг</h1></div><div class="card"><h3>Импорт</h3><div class="form-group"><textarea class="form-input" id="parseText" rows="10" placeholder="SKU001 Товар1 100\nSKU002 Товар2 200"></textarea></div><button class="btn btn-primary" onclick="app.parseText()">Парсить</button></div>');
      },
      async parseText() {
        const text = document.getElementById('parseText').value;
        const lines = text.split('\n').filter(l => l.trim());
        for (const line of lines) {
          const parts = line.trim().split(/\s+/);
          if (parts.length >= 2) {
            await db.add('products', { id: 'prod_' + Date.now() + Math.random(), sku: parts[0], name: parts[1], price: parseInt(parts[2]) || 0, createdAt: new Date().toISOString() });
          }
        }
        this.showToast('Добавлено', 'success');
        this.renderProducts();
      },
      async renderMap() {
        this.updateHeader('Карта');
        this.render('<div class="page-header"><h1>Карта</h1></div><div class="card" style="height:400px;display:flex;align-items:center;justify-content:center;"><p style="color:var(--text-secondary);">Карта (нужен Leaflet)</p></div>');
      },
      async renderSettings() {
        this.updateHeader('Настройки');
        this.render('<div class="page-header"><h1>Настройки</h1></div><div class="card"><h3>Приложение</h3><div class="form-group"><label class="form-label">Версия</label><input class="form-input" value="1.0.3" disabled></div></div><div class="card"><h3>Данные</h3><div style="display:flex;gap:8px;"><button class="btn btn-secondary" onclick="app.exportData()">Экспорт</button><button class="btn btn-secondary" onclick="app.clearData()">Очистить</button></div></div>');
      },
      async exportData() {
        const data = { templates: await db.getAll('templates'), products: await db.getAll('products'), prints: await db.getAll('prints'), exportedAt: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'sticks.json'; a.click();
        this.showToast('Экспорт', 'success');
      },
      async clearData() {
        if (confirm('Очистить все данные?')) { await db.clear(); this.showToast('Очищено', 'success'); router.navigate('/'); }
      },
      async renderNotFound() {
        this.updateHeader('404');
        this.render('<div class="empty-state"><h1>404</h1><p>Страница не найдена</p><button class="btn btn-primary" onclick="router.navigate(\'/\')" style="margin-top:16px;">На главную</button></div>');
      }
    };

    // Start
    app.init().catch(e => console.error(e));
  </script>
</body>
</html>
