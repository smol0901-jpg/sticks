<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Sticks - Универсальная система печати этикеток с ИИ">
  <meta name="theme-color" content="#e94560">
  
  <title>Sticks - Печать этикеток</title>
  
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- Styles -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/print.css" media="print">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Leaflet (Map) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  
  <style>
    /* Critical CSS - inline for fast first paint */
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #16213e;
      --accent: #e94560;
      --accent-hover: #ff6b6b;
      --text-primary: #eaeaea;
      --text-secondary: #a0a0a0;
      --border: #2a2a4a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-primary); color: var(--text-primary); }
    #app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; transform: translateX(-100%); transition: transform 0.3s ease; }
    .sidebar.open { transform: translateX(0); }
    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
    .sidebar-logo { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .sidebar-nav { flex: 1; padding: 16px; overflow-y: auto; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; color: var(--text-secondary); text-decoration: none; transition: all 0.2s ease; cursor: pointer; margin-bottom: 4px; }
    .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .nav-item.active { background: var(--accent); color: white; }
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; }
    .header { height: 60px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0; }
    .header-title { font-size: 1.25rem; font-weight: 600; }
    .header-actions { display: flex; gap: 8px; }
    .content { flex: 1; padding: 16px; overflow-y: auto; background: var(--bg-primary); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 16px; border-radius: 8px; border: none; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; text-decoration: none; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-icon { width: 40px; height: 40px; padding: 0; background: transparent; border: none; font-size: 1.2rem; cursor: pointer; }
    .card { background: var(--bg-secondary); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 16px; }
    .card h3 { margin-bottom: 16px; font-size: 1.1rem; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; margin-bottom: 4px; font-size: 0.85rem; color: var(--text-secondary); }
    .form-input { width: 100%; padding: 10px 16px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 0.95rem; }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .grid { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 16px; min-width: 300px; animation: slideIn 0.3s ease; }
    .toast.success { border-left: 4px solid #4ecca3; }
    .toast.error { border-left: 4px solid #ff4757; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .loading { display: flex; align-items: center; justify-content: center; padding: 40px; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .page-header h1 { font-size: 1.5rem; }
    .stat-card { text-align: center; padding: 24px; }
    .stat-icon { font-size: 2rem; margin-bottom: 8px; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-label { color: var(--text-secondary); font-size: 0.9rem; }
    .quick-actions { margin-top: 32px; }
    .quick-actions h2 { margin-bottom: 16px; }
    .action-card { display: block; text-decoration: none; color: inherit; transition: transform 0.2s ease; }
    .action-card:hover { transform: translateY(-4px); }
    .action-icon { font-size: 2rem; margin-bottom: 8px; }
    .action-title { font-weight: 600; margin-bottom: 4px; }
    .action-desc { color: var(--text-secondary); font-size: 0.85rem; }
    .welcome-section h1 { margin-bottom: 8px; }
    .welcome-section > p { color: var(--text-secondary); margin-bottom: 32px; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th, .data-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    .data-table th { background: var(--bg-tertiary); font-weight: 600; font-size: 0.85rem; color: var(--text-secondary); }
    .data-table tr:hover { background: var(--bg-tertiary); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal { background: var(--bg-secondary); border-radius: 16px; width: 90%; max-width: 500px; max-height: 90vh; overflow: hidden; transform: scale(0.9); transition: transform 0.3s ease; }
    .modal-overlay.active .modal { transform: scale(1); }
    .modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 20px; overflow-y: auto; max-height: calc(90vh - 140px); }
    .modal-footer { padding: 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; background: var(--bg-tertiary); }
    .badge-success { background: #4ecca3; color: #0f0f1a; }
    .badge-warning { background: #ffc107; color: #0f0f1a; }
    .badge-error { background: #ff4757; color: white; }
    .ai-chat { display: flex; flex-direction: column; height: 400px; }
    .ai-messages { flex: 1; overflow-y: auto; padding: 16px; }
    .ai-message { margin-bottom: 16px; max-width: 80%; }
    .ai-message.user { margin-left: auto; }
    .ai-message .message-content { padding: 16px; border-radius: 12px; background: var(--bg-tertiary); }
    .ai-message.user .message-content { background: var(--accent); color: white; }
    .ai-input { display: flex; gap: 8px; padding: 16px; border-top: 1px solid var(--border); }
    .ai-input input { flex: 1; }
    .map-container { height: 400px; border-radius: 12px; overflow: hidden; background: var(--bg-tertiary); }
    .template-editor { display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
    .editor-sidebar { background: var(--bg-secondary); padding: 16px; border-radius: 12px; overflow-y: auto; }
    .editor-canvas { background: var(--bg-tertiary); border-radius: 12px; padding: 20px; display: flex; align-items: center; justify-content: center; overflow: auto; }
    .label-canvas { background: white; border: 2px dashed var(--border); position: relative; overflow: hidden; }
    .label-element { position: absolute; cursor: move; border: 1px dashed transparent; }
    .label-element:hover, .label-element.selected { border-color: var(--accent); }
    .elements-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
    .element-btn { width: 100%; justify-content: flex-start; }
    .print-preview { background: white; color: black; padding: 20px; border-radius: 8px; display: flex; justify-content: center; align-items: center; min-height: 200px; }
    .label-preview { background: white; border: 1px solid #ccc; position: relative; }
    .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }
    .version { font-size: 0.75rem; color: var(--text-secondary); }
    .nav-icon { font-size: 1.2rem; }
    
    @media (max-width: 768px) {
      .sidebar { width: 100%; }
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      .template-editor { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">🎯 Sticks</div>
      </div>
      
      <nav class="sidebar-nav">
        <a href="#/" class="nav-item active" data-link>
          <span class="nav-icon">🏠</span>
          <span>Главная</span>
        </a>
        <a href="#/templates" class="nav-item" data-link>
          <span class="nav-icon">📋</span>
          <span>Шаблоны</span>
        </a>
        <a href="#/products" class="nav-item" data-link>
          <span class="nav-icon">🏷️</span>
          <span>Товары</span>
        </a>
        <a href="#/print" class="nav-item" data-link>
          <span class="nav-icon">🖨️</span>
          <span>Печать</span>
        </a>
        <a href="#/ai" class="nav-item" data-link>
          <span class="nav-icon">🤖</span>
          <span>ИИ Модуль</span>
        </a>
        <a href="#/parser" class="nav-item" data-link>
          <span class="nav-icon">📥</span>
          <span>Парсинг</span>
        </a>
        <a href="#/map" class="nav-item" data-link>
          <span class="nav-icon">🗺️</span>
          <span>Карта</span>
        </a>
        <a href="#/settings" class="nav-item" data-link>
          <span class="nav-icon">⚙️</span>
          <span>Настройки</span>
        </a>
      </nav>
      
      <div class="sidebar-footer">
        <div class="version">v1.0.1</div>
      </div>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content">
      <header class="header">
        <button class="btn btn-icon" id="menuToggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
          ☰
        </button>
        <h1 class="header-title">Главная</h1>
        <div class="header-actions">
          <button class="btn btn-icon" onclick="app.router.navigate('/settings')">⚙️</button>
        </div>
      </header>
      
      <div class="content" id="content">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </main>
  </div>
  
  <!-- Toast Container -->
  <div class="toast-container"></div>
  
  <!-- Scripts -->
  <script src="/js/db.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/ai.js"></script>
  <script src="/js/app.js"></script>
  
  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <script>
    // Platform detection
    const isElectron = window.electronAPI !== undefined;
    const isPWA = window.matchMedia('(display-mode: standalone)').matches;
    
    if (isElectron) {
      document.body.classList.add('electron');
      console.log('Running in Electron');
    }
    
    if (isPWA) {
      document.body.classList.add('pwa');
      console.log('Running as PWA');
    }
    
    // Handle import file
    document.addEventListener('change', (e) => {
      if (e.target.id === 'importFile') {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = async (ev) => {
            try {
              const data = JSON.parse(ev.target.result);
              await app.db.importAll(data);
              app.showToast('Данные импортированы', 'success');
              window.location.hash = '/';
            } catch (err) {
              app.showToast('Ошибка импорта: ' + err.message, 'error');
            }
          };
          reader.readAsText(file);
        }
      }
    });
  </script>
</body>
</html>
