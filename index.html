<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sticks - Универсальная система печати этикеток с ИИ">
  <meta name="theme-color" content="#e94560">
  
  <title>Sticks - Печать этикеток</title>
  
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  
  <!-- Styles -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/print.css" media="print">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Leaflet (Map) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">🎯 Sticks</div>
      </div>
      
      <nav class="sidebar-nav">
        <a href="/" class="nav-item" data-link>
          <span class="nav-icon">🏠</span>
          <span>Главная</span>
        </a>
        <a href="/templates" class="nav-item" data-link>
          <span class="nav-icon">📋</span>
          <span>Шаблоны</span>
        </a>
        <a href="/products" class="nav-item" data-link>
          <span class="nav-icon">🏷️</span>
          <span>Товары</span>
        </a>
        <a href="/print" class="nav-item" data-link>
          <span class="nav-icon">🖨️</span>
          <span>Печать</span>
        </a>
        <a href="/ai" class="nav-item" data-link>
          <span class="nav-icon">🤖</span>
          <span>ИИ Модуль</span>
        </a>
        <a href="/parser" class="nav-item" data-link>
          <span class="nav-icon">📥</span>
          <span>Парсинг</span>
        </a>
        <a href="/map" class="nav-item" data-link>
          <span class="nav-icon">🗺️</span>
          <span>Карта</span>
        </a>
        <a href="/settings" class="nav-item" data-link>
          <span class="nav-icon">⚙️</span>
          <span>Настройки</span>
        </a>
      </nav>
      
      <div class="sidebar-footer">
        <div class="version">v1.0.0</div>
      </div>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content">
      <header class="header">
        <button class="btn btn-icon" id="menuToggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
          ☰
        </button>
        <h1 class="header-title">Главная</h1>
        <div class="header-actions">
          <button class="btn btn-icon" onclick="app.showToast('Поиск...')">🔍</button>
          <button class="btn btn-icon" onclick="app.router.navigate('/settings')">⚙️</button>
        </div>
      </header>
      
      <div class="content" id="content">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </main>
  </div>
  
  <!-- Toast Container -->
  <div class="toast-container"></div>
  
  <!-- Scripts -->
  <script src="/js/db.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/app.js"></script>
  
  <!-- Leaflet (lazy load) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <!-- Electron specific -->
  <script>
    // Detect platform
    const isElectron = window.require !== undefined;
    const isPWA = window.matchMedia('(display-mode: standalone)').matches;
    
    if (isElectron) {
      console.log('Running in Electron');
      document.body.classList.add('electron');
    }
    
    if (isPWA) {
      console.log('Running as PWA');
      document.body.classList.add('pwa');
    }
    
    // Handle import file
    document.addEventListener('change', (e) => {
      if (e.target.id === 'importFile') {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = async (ev) => {
            try {
              const data = JSON.parse(ev.target.result);
              await app.db.importAll(data);
              app.showToast('Данные импортированы', 'success');
              app.router.navigate('/', true);
            } catch (err) {
              app.showToast('Ошибка импорта: ' + err.message, 'error');
            }
          };
          reader.readAsText(file);
        }
      }
    });
  </script>
</body>
</html>
