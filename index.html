<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Sticks - Универсальная система печати этикеток с ИИ">
  <meta name="theme-color" content="#e94560">
  <title>Sticks - Печать этикеток</title>
  
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/print.css" media="print">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #16213e;
      --accent: #e94560;
      --accent-hover: #ff6b6b;
      --text-primary: #eaeaea;
      --text-secondary: #a0a0a0;
      --border: #2a2a4a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); }
    #app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--border); position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; transform: translateX(-100%); transition: transform 0.3s ease; }
    .sidebar.open { transform: translateX(0); }
    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
    .sidebar-logo { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .sidebar-nav { padding: 16px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; color: var(--text-secondary); text-decoration: none; transition: all 0.2s ease; cursor: pointer; margin-bottom: 4px; }
    .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .nav-item.active { background: var(--accent); color: white; }
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; margin-left: 0; }
    .header { height: 60px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0; }
    .header-title { font-size: 1.25rem; font-weight: 600; }
    .content { flex: 1; padding: 16px; overflow-y: auto; background: var(--bg-primary); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 16px; border-radius: 8px; border: none; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; text-decoration: none; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-icon { width: 40px; height: 40px; padding: 0; background: transparent; border: none; font-size: 1.2rem; cursor: pointer; }
    .card { background: var(--bg-secondary); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 16px; }
    .card h3 { margin-bottom: 16px; font-size: 1.1rem; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; margin-bottom: 4px; font-size: 0.85rem; color: var(--text-secondary); }
    .form-input { width: 100%; padding: 10px 16px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 0.95rem; }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .grid { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 16px; min-width: 300px; }
    .toast.success { border-left: 4px solid #4ecca3; }
    .toast.error { border-left: 4px solid #ff4757; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 40px; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-header h1 { font-size: 1.5rem; }
    .stat-card { text-align: center; padding: 24px; }
    .stat-icon { font-size: 2rem; margin-bottom: 8px; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-label { color: var(--text-secondary); font-size: 0.9rem; }
    .quick-actions { margin-top: 32px; }
    .action-card { display: block; text-decoration: none; color: inherit; transition: transform 0.2s ease; }
    .action-card:hover { transform: translateY(-4px); }
    .action-icon { font-size: 2rem; margin-bottom: 8px; }
    .action-title { font-weight: 600; margin-bottom: 4px; }
    .action-desc { color: var(--text-secondary); font-size: 0.85rem; }
    .welcome-section h1 { margin-bottom: 8px; }
    .welcome-section > p { color: var(--text-secondary); margin-bottom: 32px; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th, .data-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    .data-table th { background: var(--bg-tertiary); font-weight: 600; font-size: 0.85rem; color: var(--text-secondary); }
    .data-table tr:hover { background: var(--bg-tertiary); }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; background: var(--bg-tertiary); }
    .badge-success { background: #4ecca3; color: #0f0f1a; }
    .ai-chat { display: flex; flex-direction: column; height: 400px; }
    .ai-messages { flex: 1; overflow-y: auto; padding: 16px; }
    .ai-message { margin-bottom: 16px; max-width: 80%; }
    .ai-message.user { margin-left: auto; }
    .ai-message .message-content { padding: 16px; border-radius: 12px; background: var(--bg-tertiary); }
    .ai-message.user .message-content { background: var(--accent); color: white; }
    .ai-input { display: flex; gap: 8px; padding: 16px; border-top: 1px solid var(--border); }
    .ai-input input { flex: 1; }
    .map-container { height: 400px; border-radius: 12px; overflow: hidden; background: var(--bg-tertiary); }
    .template-editor { display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
    .editor-sidebar { background: var(--bg-secondary); padding: 16px; border-radius: 12px; }
    .editor-canvas { background: var(--bg-tertiary); border-radius: 12px; padding: 20px; display: flex; align-items: center; justify-content: center; }
    .label-canvas { background: white; border: 2px dashed var(--border); position: relative; }
    .elements-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
    .element-btn { width: 100%; justify-content: flex-start; }
    .print-preview { background: white; color: black; padding: 20px; border-radius: 8px; display: flex; justify-content: center; align-items: center; min-height: 200px; }
    .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }
    .version { font-size: 0.75rem; color: var(--text-secondary); }
    .nav-icon { font-size: 1.2rem; }
    @media (max-width: 768px) {
      .sidebar { width: 100%; }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .template-editor { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">🎯 Sticks</div>
      </div>
      <nav class="sidebar-nav">
        <a href="#/" class="nav-item active" data-link><span class="nav-icon">🏠</span><span>Главная</span></a>
        <a href="#/templates" class="nav-item" data-link><span class="nav-icon">📋</span><span>Шаблоны</span></a>
        <a href="#/products" class="nav-item" data-link><span class="nav-icon">🏷️</span><span>Товары</span></a>
        <a href="#/print" class="nav-item" data-link><span class="nav-icon">🖨️</span><span>Печать</span></a>

        <a href="#/parser" class="nav-item" data-link><span class="nav-icon">📥</span><span>Парсинг</span></a>

      </nav>

    </aside>
    <main class="main-content">
      <header class="header">
        <button class="btn btn-icon" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <h1 class="header-title">Главная</h1>
        <div class="header-actions">
          <button class="btn btn-icon" onclick="window.app.router.navigate('/settings')">⚙️</button>
        </div>

      <div class="content" id="content">
        <div class="loading"><div class="spinner"></div></div>

  </div>
  <div class="toast-container"></div>
  
  <!-- Database -->
  <script>
    // Database Module
    const DB_NAME = 'sticks_db';
    class Database {
      constructor() { this.db = null; }
      async init() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, 1);
          request.onerror = () => reject(request.error);
          request.onsuccess = () => { this.db = request.result; resolve(this.db); };
          request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains('templates')) db.createObjectStore('templates', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('products')) db.createObjectStore('products', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('prints')) db.createObjectStore('prints', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'key' });
            if (!db.objectStoreNames.contains('aiData')) db.createObjectStore('aiData', { keyPath: 'id' });
          };
        });
      }
      async add(store, data) {
        return new Promise((resolve, reject) => {
          const tx = this.db.transaction(store, 'readwrite');
          const request = tx.objectStore(store).add(data);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }
      async put(store, data) {
        return new Promise((resolve, reject) => {
          const tx = this.db.transaction(store, 'readwrite');
          const request = tx.objectStore(store).put(data);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }
      async get(store, key) {
        return new Promise((resolve) => {
          const tx = this.db.transaction(store, 'readonly');
          const request = tx.objectStore(store).get(key);
          request.onsuccess = () => resolve(request.result);
        });
      }
      async getAll(store) {
        return new Promise((resolve) => {
          const tx = this.db.transaction(store, 'readonly');
          const request = tx.objectStore(store).getAll();
          request.onsuccess = () => resolve(request.result || []);
        });
      }
      async delete(store, key) {
        return new Promise((resolve) => {
          const tx = this.db.transaction(store, 'readwrite');
          tx.objectStore(store).delete(key);
          tx.oncomplete = () => resolve(true);
        });
      }
      async clearStore(store) {
        return new Promise((resolve) => {
          const tx = this.db.transaction(store, 'readwrite');
          tx.objectStore(store).clear();
          tx.oncomplete = () => resolve(true);
        });
      }
      async clear() {
        await this.clearStore('templates');
        await this.clearStore('products');
        await this.clearStore('prints');
        await this.clearStore('settings');
        await this.clearStore('aiData');
      }
      async count(store) { return (await this.getAll(store)).length; }
      async getSetting(key, defaultValue) {
        const setting = await this.get('settings', key);
        return setting ? setting.value : defaultValue;
      }
      async setSetting(key, value) { await this.put('settings', { key, value }); }
    }
    window.Database = Database;
  </script>
  
  <script>
    // Router Module
    class Router {
      constructor() { this.routes = []; }
      add(path, handler) { this.routes.push({ path, handler }); return this; }
      navigate(path) {
        window.location.hash = path.startsWith('#') ? path : '#' + path;
      }
      getPath() { return window.location.hash.slice(1) || '/'; }
      match(path) {
        for (const route of this.routes) {
          if (route.path === path || (route.path !== '*' && path.startsWith(route.path.replace('*', '')))) {
            return route;
          }
        }
        return this.routes.find(r => r.path === '*');
      }
      async handleRoute() {
        const path = this.getPath();
        const route = this.match(path);
        if (route) await route.handler();
        document.querySelectorAll('.nav-item').forEach(item => {
          item.classList.remove('active');
          if (item.getAttribute('href') === '#' + path) item.classList.add('active');
        });
        document.getElementById('sidebar').classList.remove('open');
      }
      init() {
        window.addEventListener('hashchange', () => this.handleRoute());
        document.addEventListener('click', (e) => {
          const link = e.target.closest('a[data-link]');
          if (link) { e.preventDefault(); this.navigate(link.getAttribute('href').replace('#', '')); }
        });
        if (!window.location.hash) this.navigate('/');
        else setTimeout(() => this.handleRoute(), 100);
      }
    }
    window.Router = Router;
  </script>
  
  <script>
    // AI Module
    class AIModule {
      constructor() {
        this.conversation = [];
        this.systemPrompt = 'Ты - помощник для системы печати этикеток "Sticks". Ты можешь помочь с созданием дизайна этикеток, подбором цветов, заполнением данных о товарах. Отвечай кратко и по делу.';
      }
      async init() {}
      async setApiKey(provider, key) {
        if (window.app && window.app.db) await window.app.db.setSetting('ai_' + provider + '_key', key);
      }
      async getApiKey(provider) {
        if (window.app && window.app.db) return await window.app.db.getSetting('ai_' + provider + '_key', '');
        return '';
      }
      async hasApiKey(provider) { const key = await this.getApiKey(provider); return key && key.length > 0; }
      async sendMessage(message) {
        const apiKey = await this.getApiKey('openai');
        if (!apiKey) return { error: 'API ключ не настроен. Перейдите в Настройки → ИИ.' };
        this.conversation.push({ role: 'user', content: message });
        try {
          const response = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
            body: JSON.stringify({
              model: 'gpt-4o-mini',
              messages: [{ role: 'system', content: this.systemPrompt }, ...this.conversation.slice(-10), { role: 'user', content: message }],
              temperature: 0.7, max_tokens: 1000
            })
          });
          if (!response.ok) throw new Error('API error');
          const data = await response.json();
          const content = data.choices[0].message.content;
          this.conversation.push({ role: 'assistant', content });
          return { content };
        } catch (e) {
          this.conversation.pop();
          return { error: e.message };
        }
      }
    }
    window.aiModule = new AIModule();
  </script>
  
  <script>
    // Main App
    class App {
      constructor() {
        this.db = null;
        this.router = null;
        this.ai = window.aiModule;
      }
      async init() {
        console.log('Sticks initializing...');
        this.db = new Database();
        await this.db.init();
        if (this.ai) await this.ai.init();
        this.router = new Router();
        this.setupRoutes();
        this.router.init();
        console.log('Sticks ready');
      }
      setupRoutes() {
        this.router.add('/', () => this.renderHome());
        this.router.add('/templates', () => this.renderTemplates());
        this.router.add('/products', () => this.renderProducts());
        this.router.add('/print', () => this.renderPrint());
        this.router.add('/ai', () => this.renderAI());
        this.router.add('/parser', () => this.renderParser());
        this.router.add('/map', () => this.renderMap());
        this.router.add('/settings', () => this.renderSettings());
        this.router.add('*', () => this.renderNotFound());
      }
      updateHeader(title) { document.querySelector('.header-title').textContent = title; }
      render(content) { document.getElementById('content').innerHTML = content; }
      showToast(message, type) {
        const container = document.querySelector('.toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast ' + (type || '');
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }
      async renderHome() {
        this.updateHeader('Главная');
        const stats = { templates: await this.db.count('templates'), products: await this.db.count('products'), prints: await this.db.count('prints') };
        this.render('<div class="welcome-section"><h1>Добро пожаловать в Sticks</h1><p>Система печати этикеток с ИИ</p><div class="grid grid-3"><div class="card stat-card"><div class="stat-icon">📋</div><div class="stat-value">' + stats.templates + '</div><div class="stat-label">Шаблонов</div></div><div class="card stat-card"><div class="stat-icon">🏷️</div><div class="stat-value">' + stats.products + '</div><div class="stat-label">Товаров</div></div><div class="card stat-card"><div class="stat-icon">🖨️</div><div class="stat-value">' + stats.prints + '</div><div class="stat-label">Печатей</div></div></div><div class="quick-actions"><h2>Быстрые действия</h2><div class="grid grid-2"><a href="#/templates" class="card action-card" data-link><div class="action-icon">📋</div><div class="action-title">Новый шаблон</div><div class="action-desc">Создать этикетку</div></a><a href="#/products" class="card action-card" data-link><div class="action-icon">🏷️</div><div class="action-title">Добавить товар</div><div class="action-desc">Заполнить карточку</div></a><a href="#/print" class="card action-card" data-link><div class="action-icon">🖨️</div><div class="action-title">Печать</div><div class="action-desc">Напечатать этикетки</div></a><a href="#/ai" class="card action-card" data-link><div class="action-icon">🤖</div><div class="action-title">ИИ Помощник</div><div class="action-desc">Спросить ИИ</div></a></div></div></div>');
      }
      async renderTemplates() {
        this.updateHeader('Шаблоны');
        const templates = await this.db.getAll('templates');
        this.render('<div class="page-header"><h1>Шаблоны этикеток</h1><button class="btn btn-primary" onclick="app.createTemplate()">+ Новый</button></div>' + (templates.length ? '<div class="grid grid-3">' + templates.map(t => '<div class="card"><div class="label-canvas" style="width:150px;height:100px;margin:0 auto 16px;"></div><h3>' + t.name + '</h3><p style="color:var(--text-secondary);font-size:0.85rem;">' + (t.width||50) + '×' + (t.height||30) + 'мм</p></div>').join('') + '</div>' : '<div class="empty-state"><p>Шаблонов пока нет</p><button class="btn btn-primary" onclick="app.createTemplate()" style="margin-top:16px;">Создать первый</button></div>'));
      }
      async createTemplate() {
        const template = { id: 'tpl_' + Date.now(), name: 'Новый шаблон', width: 50, height: 30, elements: [], createdAt: new Date().toISOString() };
        await this.db.add('templates', template);
        this.showToast('Шаблон создан', 'success');
        this.renderTemplates();
      }
      async renderProducts() {
        this.updateHeader('Товары');
        const products = await this.db.getAll('products');
        this.render('<div class="page-header"><h1>Товары</h1><button class="btn btn-primary" onclick="app.createProduct()">+ Добавить</button></div>' + (products.length ? '<table class="data-table"><thead><tr><th>Артикул</th><th>Название</th><th>Цена</th><th>Действия</th></tr></thead><tbody>' + products.map(p => '<tr><td>' + p.sku + '</td><td>' + p.name + '</td><td>' + (p.price||0) + ' ₽</td><td><button class="btn btn-secondary" onclick="app.deleteProduct(\'' + p.id + '\')">Удалить</button></td></tr>').join('') + '</tbody></table>' : '<div class="empty-state"><p>Товаров пока нет</p><button class="btn btn-primary" onclick="app.createProduct()" style="margin-top:16px;">Добавить первый</button></div>'));
      }
      async createProduct() {
        const product = { id: 'prod_' + Date.now(), sku: 'SKU' + Date.now().toString().slice(-6), name: 'Новый товар', price: 0, createdAt: new Date().toISOString() };
        await this.db.add('products', product);
        this.showToast('Товар добавлен', 'success');
        this.renderProducts();
      }
      async deleteProduct(id) {
        if (confirm('Удалить товар?')) { await this.db.delete('products', id); this.showToast('Товар удалён', 'success'); this.renderProducts(); }
      }
      async renderPrint() {
        this.updateHeader('Печать');
        const templates = await this.db.getAll('templates');
        const products = await this.db.getAll('products');
        this.render('<div class="page-header"><h1>Печать этикеток</h1></div><div class="grid grid-2" style="gap:24px;"><div class="card"><h3>1. Шаблон</h3><select class="form-input" id="printTemplate"><option value="">-- Выберите --</option>' + templates.map(t => '<option value="' + t.id + '">' + t.name + '</option>').join('') + '</select></div><div class="card"><h3>2. Товар</h3><select class="form-input" id="printProduct"><option value="">-- Выберите --</option>' + products.map(p => '<option value="' + p.id + '">' + p.sku + ' - ' + p.name + '</option>').join('') + '</select></div></div><div style="margin-top:24px;display:flex;gap:8px;"><div class="form-group" style="width:100px;"><label class="form-label">Количество</label><input type="number" class="form-input" id="printQty" value="1" min="1"></div><button class="btn btn-primary" style="align-self:flex-end;" onclick="app.doPrint()">🖨️ Печатать</button></div></div>');
      }
      async doPrint() {
        const templateId = document.getElementById('printTemplate').value;
        const productId = document.getElementById('printProduct').value;
        const qty = parseInt(document.getElementById('printQty').value) || 1;
        if (!templateId || !productId) { this.showToast('Выберите шаблон и товар', 'error'); return; }
        await this.db.add('prints', { id: 'print_' + Date.now(), templateId, productId, qty, printedAt: new Date().toISOString() });
        this.showToast('Отправлено на печать ' + qty + ' этикеток', 'success');
      }
      async renderAI() {
        this.updateHeader('ИИ Модуль');
        const hasKey = await this.ai.hasApiKey('openai');
        this.render('<div class="page-header"><h1>ИИ Помощник</h1></div><div class="card" style="margin-bottom:24px;"><h3>Настройка API ключей</h3><div class="form-group"><label class="form-label">OpenAI API Key</label><input type="password" class="form-input" id="openaiKey" placeholder="sk-..." onchange="app.saveApiKey()">' + (hasKey ? '<span class="badge badge-success" style="margin-left:8px;">Настроен</span>' : '') + '</div></div><div class="card"><h3>Чат с ИИ</h3><div class="ai-chat"><div class="ai-messages" id="aiMessages"><p style="color:var(--text-secondary);">Задайте вопрос о печати этикеток</p></div><div class="ai-input"><input type="text" class="form-input" id="aiInput" placeholder="Введите сообщение..." onkeypress="if(event.key==\'Enter\')app.sendAI()"><button class="btn btn-primary" onclick="app.sendAI()">Отправить</button></div></div></div>');
      }
      async saveApiKey() {
        const key = document.getElementById('openaiKey').value;
        if (key) { await this.ai.setApiKey('openai', key); this.showToast('API ключ сохранён', 'success'); this.renderAI(); }
      }
      async sendAI() {
        const input = document.getElementById('aiInput');
        const message = input.value.trim();
        if (!message) return;
        const messagesEl = document.getElementById('aiMessages');
        messagesEl.innerHTML += '<div class="ai-message user"><div class="message-content">' + message + '</div></div>';
        input.value = '';
        messagesEl.innerHTML += '<div class="ai-message"><div class="message-content"><div class="spinner"></div></div></div>';
        messagesEl.scrollTop = messagesEl.scrollHeight;
        const response = await this.ai.sendMessage(message);
        messagesEl.querySelector('.spinner')?.closest('.ai-message')?.remove();
        if (response.error) messagesEl.innerHTML += '<div class="ai-message"><div class="message-content" style="color:#ff4757;">' + response.error + '</div></div>';
        else messagesEl.innerHTML += '<div class="ai-message"><div class="message-content">' + response.content + '</div></div>';
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
      async renderParser() {
        this.updateHeader('Парсинг');
        this.render('<div class="page-header"><h1>Парсинг данных</h1></div><div class="card"><h3>Импорт из текста</h3><div class="form-group"><label class="form-label">Вставьте текст</label><textarea class="form-input" id="parseText" rows="10" placeholder="SKU001 Товар1 100\nSKU002 Товар2 200"></textarea></div><button class="btn btn-primary" onclick="app.parseText()">📥 Парсить</button></div>');
      }
      async parseText() {
        const text = document.getElementById('parseText').value;
        const lines = text.split('\n').filter(l => l.trim());
        for (const line of lines) {
          const parts = line.trim().split(/\s+/);
          if (parts.length >= 2) {
            await this.db.add('products', { id: 'prod_' + Date.now() + Math.random(), sku: parts[0], name: parts[1], price: parseInt(parts[2]) || 0, createdAt: new Date().toISOString() });
          }
        }
        this.showToast('Добавлено товаров', 'success');
        this.renderProducts();
      }
      async renderMap() {
        this.updateHeader('Карта');
        this.render('<div class="page-header"><h1>Карта складов</h1></div><div class="card"><div class="map-container"><p style="text-align:center;padding:40px;color:var(--text-secondary);">Карта загружается...</p></div></div>');
        setTimeout(() => {
          if (typeof L !== 'undefined') {
            const map = L.map(document.querySelector('.map-container')).setView([55.75, 37.62], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
          }
        }, 1000);
      }
      async renderSettings() {
        this.updateHeader('Настройки');
        this.render('<div class="page-header"><h1>Настройки</h1></div><div class="card"><h3>Приложение</h3><div class="form-group"><label class="form-label">Версия</label><input class="form-input" value="1.0.2" disabled></div></div><div class="card"><h3>Данные</h3><div style="display:flex;gap:8px;"><button class="btn btn-secondary" onclick="app.exportData()">📤 Экспорт</button><button class="btn btn-secondary" onclick="app.clearData()">🗑️ Очистить</button></div></div>');
      }
      async exportData() {
        const data = { templates: await this.db.getAll('templates'), products: await this.db.getAll('products'), prints: await this.db.getAll('prints'), exportedAt: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'sticks-export.json'; a.click();
        URL.revokeObjectURL(url);
        this.showToast('Данные экспортированы', 'success');
      }
      async clearData() {
        if (confirm('Очистить все данные?')) { await this.db.clear(); this.showToast('Данные очищены', 'success'); this.router.navigate('/'); }
      }
      renderNotFound() { this.updateHeader('404'); this.render('<div class="empty-state"><h1>404</h1><p>Страница не найдена</p><button class="btn btn-primary" onclick="window.location.hash=\'#/\'" style="margin-top:16px;">На главную</button></div>'); }
    }
    window.app = new App();
    window.app.init().catch(e => console.error(e));
  </script>
</body>
</html>
