<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sticks - Система печати этикеток">
  <meta name="theme-color" content="#e94560">
  <title>Sticks - Печать этикеток</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg-primary: #0f0f1a; --bg-secondary: #1a1a2e; --bg-tertiary: #16213e; --accent: #e94560; --accent-hover: #ff6b6b; --text-primary: #eaeaea; --text-secondary: #a0a0a0; --border: #2a2a4a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); }
    #app { display: flex; height: 100vh; }
    .sidebar { width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--border); position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; transform: translateX(-100%); transition: transform 0.3s; }
    .sidebar.open { transform: translateX(0); }
    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
    .sidebar-logo { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .sidebar-nav { padding: 16px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; color: var(--text-secondary); cursor: pointer; margin-bottom: 4px; }
    .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .nav-item.active { background: var(--accent); color: white; }
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; }
    .header { height: 60px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0; }
    .header-title { font-size: 1.25rem; font-weight: 600; }
    .content { flex: 1; padding: 16px; overflow-y: auto; background: var(--bg-primary); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 16px; border-radius: 8px; border: none; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-icon { width: 40px; height: 40px; padding: 0; background: transparent; border: none; font-size: 1.2rem; cursor: pointer; }
    .card { background: var(--bg-secondary); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; margin-bottom: 4px; font-size: 0.85rem; color: var(--text-secondary); }
    .form-input { width: 100%; padding: 10px 16px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 0.95rem; }
    .grid { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; }
    .toast { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-top: 8px; }
    .toast.success { border-left: 4px solid #4ecca3; }
    .toast.error { border-left: 4px solid #ff4757; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 40px; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-header h1 { font-size: 1.5rem; }
    .stat-card { text-align: center; padding: 24px; }
    .stat-icon { font-size: 2rem; margin-bottom: 8px; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-label { color: var(--text-secondary); font-size: 0.9rem; }
    .action-card { display: block; text-decoration: none; color: inherit; padding: 20px; border-radius: 12px; background: var(--bg-secondary); border: 1px solid var(--border); cursor: pointer; }
    .action-card:hover { transform: translateY(-4px); }
    .action-icon { font-size: 2rem; margin-bottom: 8px; }
    .action-title { font-weight: 600; margin-bottom: 4px; }
    .action-desc { color: var(--text-secondary); font-size: 0.85rem; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th, .data-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    .data-table th { background: var(--bg-tertiary); font-weight: 600; color: var(--text-secondary); }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; background: var(--bg-tertiary); }
    .badge-success { background: #4ecca3; color: #0f0f1a; }
    .ai-chat { display: flex; flex-direction: column; height: 400px; }
    .ai-messages { flex: 1; overflow-y: auto; padding: 16px; }
    .ai-message { margin-bottom: 16px; max-width: 80%; }
    .ai-message.user { margin-left: auto; }
    .ai-message .message-content { padding: 16px; border-radius: 12px; background: var(--bg-tertiary); }
    .ai-message.user .message-content { background: var(--accent); color: white; }
    .ai-input { display: flex; gap: 8px; padding: 16px; border-top: 1px solid var(--border); }
    .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }
    .version { font-size: 0.75rem; color: var(--text-secondary); }
    @media (max-width: 768px) { .sidebar { width: 100%; } .grid-2, .grid-3 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><div class="sidebar-logo">🎯 Sticks</div></div>
      <nav class="sidebar-nav">
        <div class="nav-item active" data-route="/"><span>🏠</span><span>Главная</span></div>
        <div class="nav-item" data-route="/templates"><span>📋</span><span>Шаблоны</span></div>
        <div class="nav-item" data-route="/products"><span>🏷️</span><span>Товары</span></div>
        <div class="nav-item" data-route="/print"><span>🖨️</span><span>Печать</span></div>
        <div class="nav-item" data-route="/ai"><span>🤖</span><span>ИИ Модуль</span></div>
        <div class="nav-item" data-route="/parser"><span>📥</span><span>Парсинг</span></div>
        <div class="nav-item" data-route="/map"><span>🗺️</span><span>Карта</span></div>
        <div class="nav-item" data-route="/settings"><span>⚙️</span><span>Настройки</span></div>
      </nav>
      <div class="sidebar-footer"><div class="version">v1.0.4</div></div>
    </aside>
    <main class="main-content">
      <header class="header">
        <button class="btn btn-icon" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <h1 class="header-title">Главная</h1>
        <button class="btn btn-icon" onclick="navigate('/settings')">⚙️</button>
      </header>
      <div class="content" id="content"><div class="loading"><div class="spinner"></div></div></div>
    </main>
  </div>
  <div class="toast-container"></div>

  <script>
    // Database
    const DB_NAME = 'sticks_db';
    class Database {
      constructor() { this.db = null; }
      async init() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, 1);
          request.onerror = () => reject(request.error);
          request.onsuccess = () => { this.db = request.result; resolve(); };
          request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains('templates')) db.createObjectStore('templates', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('products')) db.createObjectStore('products', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('prints')) db.createObjectStore('prints', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'key' });
          };
        });
      }
      async add(store, data) {
        return new Promise((resolve, reject) => {
          const tx = this.db.transaction(store, 'readwrite');
          const req = tx.objectStore(store).add(data);
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      }
      async put(store, data) {
        return new Promise((resolve, reject) => {
          const tx = this.db.transaction(store, 'readwrite');
          const req = tx.objectStore(store).put(data);
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      }
      async get(store, key) {
        return new Promise((resolve) => {
          const tx = this.db.transaction(store, 'readonly');
          const req = tx.objectStore(store).get(key);
          req.onsuccess = () => resolve(req.result);
        });
      }
      async getAll(store) {
        return new Promise((resolve) => {
          const tx = this.db.transaction(store, 'readonly');
          const req = tx.objectStore(store).getAll();
          req.onsuccess = () => resolve(req.result || []);
        });
      }
      async delete(store, key) {
        return new Promise((resolve) => {
          const tx = this.db.transaction(store, 'readwrite');
          tx.objectStore(store).delete(key);
          tx.oncomplete = () => resolve(true);
        });
      }
      async clearStore(store) {
        return new Promise((resolve) => {
          const tx = this.db.transaction(store, 'readwrite');
          tx.objectStore(store).clear();
          tx.oncomplete = () => resolve(true);
        });
      }
      async clear() {
        await this.clearStore('templates');
        await this.clearStore('products');
        await this.clearStore('prints');
        await this.clearStore('settings');
      }
      async count(store) { return (await this.getAll(store)).length; }
      async getSetting(key, defaultValue) {
        const setting = await this.get('settings', key);
        return setting ? setting.value : defaultValue;
      }
      async setSetting(key, value) { await this.put('settings', { key, value }); }
    }

    // Global state
    let db, ai;
    let currentPage = '/';

    // Navigation
    function navigate(path) {
      currentPage = path;
      window.location.hash = path;
      renderPage(path);
      updateNav(path);
      document.getElementById('sidebar').classList.remove('open');
    }

    function updateNav(path) {
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
        if (item.dataset.route === path) item.classList.add('active');
      });
      document.querySelector('.header-title').textContent = getTitle(path);
    }

    function getTitle(path) {
      const titles = { '/': 'Главная', '/templates': 'Шаблоны', '/products': 'Товары', '/print': 'Печать', '/ai': 'ИИ', '/parser': 'Парсинг', '/map': 'Карта', '/settings': 'Настройки' };
      return titles[path] || 'Страница';
    }

    // Render pages
    async function renderPage(path) {
      const content = document.getElementById('content');
      
      switch(path) {
        case '/':
          await renderHome();
          break;
        case '/templates':
          await renderTemplates();
          break;
        case '/products':
          await renderProducts();
          break;
        case '/print':
          await renderPrint();
          break;
        case '/ai':
          await renderAI();
          break;
        case '/parser':
          await renderParser();
          break;
        case '/map':
          await renderMap();
          break;
        case '/settings':
          await renderSettings();
          break;
        default:
          content.innerHTML = '<div class="empty-state"><h1>404</h1><p>Страница не найдена</p></div>';
      }
    }

    function showToast(msg, type = '') {
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = msg;
      document.querySelector('.toast-container').appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // Page renders
    async function renderHome() {
      const stats = { templates: await db.count('templates'), products: await db.count('products'), prints: await db.count('prints') };
      document.getElementById('content').innerHTML = '<h1>Добро пожаловать в Sticks</h1><p style="color:var(--text-secondary);margin-bottom:32px;">Система печати этикеток с ИИ</p><div class="grid grid-3"><div class="card stat-card"><div class="stat-icon">📋</div><div class="stat-value">' + stats.templates + '</div><div class="stat-label">Шаблонов</div></div><div class="card stat-card"><div class="stat-icon">🏷️</div><div class="stat-value">' + stats.products + '</div><div class="stat-label">Товаров</div></div><div class="card stat-card"><div class="stat-icon">🖨️</div><div class="stat-value">' + stats.prints + '</div><div class="stat-label">Печатей</div></div></div><h2 style="margin:32px 0 16px;">Быстрые действия</h2><div class="grid grid-2"><div class="action-card" onclick="navigate(\x27/templates\x27)"><div class="action-icon">📋</div><div class="action-title">Шаблоны</div><div class="action-desc">Управление шаблонами</div></div><div class="action-card" onclick="navigate(\x27/products\x27)"><div class="action-icon">🏷️</div><div class="action-title">Товары</div><div class="action-desc">Каталог товаров</div></div><div class="action-card" onclick="navigate(\x27/print\x27)"><div class="action-icon">🖨️</div><div class="action-title">Печать</div><div class="action-desc">Печать этикеток</div></div><div class="action-card" onclick="navigate(\x27/ai\x27)"><div class="action-icon">🤖</div><div class="action-title">ИИ Помощник</div><div class="action-desc">Спросить ИИ</div></div></div>';
    }

    async function renderTemplates() {
      const templates = await db.getAll('templates');
      document.getElementById('content').innerHTML = '<div class="page-header"><h1>Шаблоны</h1><button class="btn btn-primary" onclick="createTemplate()">+ Новый</button></div>' + (templates.length ? '<div class="grid grid-3">' + templates.map(t => '<div class="card"><h3>' + t.name + '</h3><p style="color:var(--text-secondary);font-size:0.85rem;">' + (t.width||50) + '×' + (t.height||30) + 'мм</p></div>').join('') + '</div>' : '<div class="empty-state"><p>Шаблонов пока нет</p><button class="btn btn-primary" onclick="createTemplate()" style="margin-top:16px;">Создать</button></div>');
    }

    async function createTemplate() {
      const tpl = { id: 'tpl_' + Date.now(), name: 'Шаблон ' + Date.now().toString().slice(-4), width: 50, height: 30, createdAt: new Date().toISOString() };
      await db.add('templates', tpl);
      showToast('Шаблон создан', 'success');
      renderTemplates();
    }

    async function renderProducts() {
      const products = await db.getAll('products');
      document.getElementById('content').innerHTML = '<div class="page-header"><h1>Товары</h1><button class="btn btn-primary" onclick="createProduct()">+ Добавить</button></div>' + (products.length ? '<table class="data-table"><thead><tr><th>Артикул</th><th>Название</th><th>Цена</th><th></th></tr></thead><tbody>' + products.map(p => '<tr><td>' + p.sku + '</td><td>' + p.name + '</td><td>' + (p.price||0) + ' ₽</td><td><button class="btn btn-secondary" style="padding:4px 8px;" onclick="deleteProduct(\x27' + p.id + '\x27)">✕</button></td></tr>').join('') + '</tbody></table>' : '<div class="empty-state"><p>Товаров нет</p><button class="btn btn-primary" onclick="createProduct()" style="margin-top:16px;">Добавить</button></div>');
    }

    async function createProduct() {
      const prod = { id: 'prod_' + Date.now(), sku: 'SKU' + Date.now().toString().slice(-6), name: 'Товар', price: 0, createdAt: new Date().toISOString() };
      await db.add('products', prod);
      showToast('Товар добавлен', 'success');
      renderProducts();
    }

    async function deleteProduct(id) {
      if (confirm('Удалить?')) { await db.delete('products', id); showToast('Удалён', 'success'); renderProducts(); }
    }

    async function renderPrint() {
      const templates = await db.getAll('templates');
      const products = await db.getAll('products');
      document.getElementById('content').innerHTML = '<div class="page-header"><h1>Печать</h1></div><div class="grid grid-2"><div class="card"><h3>Шаблон</h3><select class="form-input" id="printTemplate"><option value="">-- Выберите --</option>' + templates.map(t => '<option value="' + t.id + '">' + t.name + '</option>').join('') + '</select></div><div class="card"><h3>Товар</h3><select class="form-input" id="printProduct"><option value="">-- Выберите --</option>' + products.map(p => '<option value="' + p.id + '">' + p.sku + ' - ' + p.name + '</option>').join('') + '</select></div></div><div class="form-group" style="margin-top:24px;"><label class="form-label">Количество</label><input type="number" class="form-input" id="printQty" value="1" min="1" style="width:100px;"></div><button class="btn btn-primary" onclick="doPrint()" style="margin-top:16px;">🖨️ Печатать</button>';
    }

    async function doPrint() {
      const templateId = document.getElementById('printTemplate').value;
      const productId = document.getElementById('printProduct').value;
      const qty = parseInt(document.getElementById('printQty').value) || 1;
      if (!templateId || !productId) { showToast('Выберите шаблон и товар', 'error'); return; }
      await db.add('prints', { id: 'print_' + Date.now(), templateId, productId, qty, printedAt: new Date().toISOString() });
      showToast('Напечатано ' + qty + ' этикеток', 'success');
    }

    async function renderAI() {
      const hasKey = await db.getSetting('ai_openai_key', '');
      document.getElementById('content').innerHTML = '<div class="page-header"><h1>ИИ Модуль</h1></div><div class="card" style="margin-bottom:24px;"><h3>API ключ OpenAI</h3><div class="form-group"><input type="password" class="form-input" id="openaiKey" placeholder="sk-..." value="' + (hasKey || '') + '" onchange="saveApiKey()"></div>' + (hasKey ? '<span class="badge badge-success">Настроен</span>' : '') + '</div><div class="card"><h3>Чат</h3><div class="ai-chat"><div class="ai-messages" id="aiMessages"><p style="color:var(--text-secondary);">Задайте вопрос</p></div><div class="ai-input"><input type="text" class="form-input" id="aiInput" placeholder="Сообщение..." onkeypress="if(event.key==\x27Enter\x27)sendAI()"><button class="btn btn-primary" onclick="sendAI()">Отправить</button></div></div></div>';
    }

    async function saveApiKey() {
      const key = document.getElementById('openaiKey').value;
      if (key) { await db.setSetting('ai_openai_key', key); showToast('Сохранён', 'success'); }
    }

    async function sendAI() {
      const input = document.getElementById('aiInput');
      const msg = input.value.trim();
      if (!msg) return;
      const msgs = document.getElementById('aiMessages');
      msgs.innerHTML += '<div class="ai-message user"><div class="message-content">' + msg + '</div></div>';
      input.value = '';
      msgs.innerHTML += '<div class="ai-message"><div class="message-content"><div class="spinner"></div></div></div>';
      msgs.scrollTop = msgs.scrollHeight;
      
      const apiKey = await db.getSetting('ai_openai_key', '');
      if (!apiKey) { msgs.innerHTML += '<div class="ai-message"><div class="message-content" style="color:#ff4757;">API ключ не настроен</div></div>'; return; }
      
      try {
        const resp = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
          body: JSON.stringify({ model: 'gpt-4o-mini', messages: [{ role: 'system', content: 'Ты - помощник для Sticks.' }, { role: 'user', content: msg }], temperature: 0.7, max_tokens: 1000 })
        });
        const data = await resp.json();
        msgs.querySelector('.spinner')?.closest('.ai-message')?.remove();
        if (data.choices) msgs.innerHTML += '<div class="ai-message"><div class="message-content">' + data.choices[0].message.content + '</div></div>';
        else msgs.innerHTML += '<div class="ai-message"><div class="message-content" style="color:#ff4757;">Ошибка: ' + (data.error?.message || 'unknown') + '</div></div>';
      } catch(e) {
        msgs.querySelector('.spinner')?.closest('.ai-message')?.remove();
        msgs.innerHTML += '<div class="ai-message"><div class="message-content" style="color:#ff4757;">' + e.message + '</div></div>';
      }
      msgs.scrollTop = msgs.scrollHeight;
    }

    async function renderParser() {
      document.getElementById('content').innerHTML = '<div class="page-header"><h1>Парсинг</h1></div><div class="card"><h3>Импорт</h3><div class="form-group"><textarea class="form-input" id="parseText" rows="10" placeholder="SKU001 Товар1 100\nSKU002 Товар2 200"></textarea></div><button class="btn btn-primary" onclick="parseText()">Парсить</button></div>';
    }

    async function parseText() {
      const text = document.getElementById('parseText').value;
      const lines = text.split('\n').filter(l => l.trim());
      for (const line of lines) {
        const parts = line.trim().split(/\s+/);
        if (parts.length >= 2) {
          await db.add('products', { id: 'prod_' + Date.now() + Math.random(), sku: parts[0], name: parts[1], price: parseInt(parts[2]) || 0, createdAt: new Date().toISOString() });
        }
      }
      showToast('Добавлено', 'success');
      navigate('/products');
    }

    async function renderMap() {
      document.getElementById('content').innerHTML = '<div class="page-header"><h1>Карта</h1></div><div class="card" style="height:400px;display:flex;align-items:center;justify-content:center;"><p style="color:var(--text-secondary);">Карта (нужен Leaflet)</p></div>';
    }

    async function renderSettings() {
      document.getElementById('content').innerHTML = '<div class="page-header"><h1>Настройки</h1></div><div class="card"><h3>Приложение</h3><div class="form-group"><label class="form-label">Версия</label><input class="form-input" value="1.0.4" disabled></div></div><div class="card"><h3>Данные</h3><div style="display:flex;gap:8px;"><button class="btn btn-secondary" onclick="exportData()">Экспорт</button><button class="btn btn-secondary" onclick="clearData()">Очистить</button></div></div>';
    }

    async function exportData() {
      const data = { templates: await db.getAll('templates'), products: await db.getAll('products'), prints: await db.getAll('prints'), exportedAt: new Date().toISOString() };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'sticks.json'; a.click();
      showToast('Экспорт', 'success');
    }

    async function clearData() {
      if (confirm('Очистить все данные?')) { await db.clear(); showToast('Очищено', 'success'); navigate('/'); }
    }

    // Init nav clicks
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        const path = item.dataset.route;
        if (path) navigate(path);
      });
    });

    // Handle hash changes
    window.addEventListener('hashchange', () => {
      const path = window.location.hash.slice(1) || '/';
      renderPage(path);
      updateNav(path);
    });

    // Start
    (async function init() {
      console.log('Sticks init...');
      db = new Database();
      await db.init();
      
      // Initial route
      const path = window.location.hash.slice(1) || '/';
      await renderPage(path);
      updateNav(path);
      console.log('Sticks ready');
    })();
  </script>
</body>
